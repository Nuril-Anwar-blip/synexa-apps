name: aplication_stroke
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  google_maps_flutter: ^2.14.0
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.4
  camera: ^0.11.3
  image_picker: ^1.2.1
  qr_code_scanner_plus: ^2.0.14
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  url_launcher: ^6.3.2
  file_picker: ^10.3.9
  video_player: ^2.10.1
  share_plus: ^12.0.1
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.1
  http: ^1.6.0
  provider: ^6.1.5+1
  uuid: ^4.4.0
  flutter_facebook_auth: ^7.1.5
  google_sign_in: ^6.2.1
  google_fonts: ^8.0.2
  alarm: ^5.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets: 
    - assets/images/
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"